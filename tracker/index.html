const ITERATIONS = 600000;
const KEY_STORE = "sfsTrackerKey.v1";

function payloadBytes() {
  const raw = atob(PAYLOAD);
  const a = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) a[i] = raw.charCodeAt(i);
  return a;
}
function b64(buf) {
  const a = new Uint8Array(buf); let s = "";
  for (let i = 0; i < a.length; i++) s += String.fromCharCode(a[i]);
  return btoa(s);
}
function ub64(s) {
  const raw = atob(s);
  const a = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) a[i] = raw.charCodeAt(i);
  return a;
}
async function decryptWith(key) {
  const b = payloadBytes();
  const iv = b.slice(16, 28), ct = b.slice(28);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct); // throws on wrong key
  return new TextDecoder().decode(pt);

function show(html) {

  const doShow = () => { document.open(); document.write(html); document.close(); };
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", doShow);

}
async function tryStoredKey(stored) {
  try {
    const key = await crypto.subtle.importKey("raw", ub64(stored), { name: "AES-GCM" }, false, ["decrypt"]);
    const html = await decryptWith(key);
    show(html);
    return true;
  } catch (e) {
    try { localStorage.removeItem(KEY_STORE); } catch (e2) {}
    return false;
  }
}
function init() {
  let stored = null;
  try { stored = localStorage.getItem(KEY_STORE); } catch (e) {}
  if (!stored) return;
  const form = document.getElementById("f"), sub = document.querySelector(".sub");
  form.hidden = true;
  sub.textContent = "Opening…";
  tryStoredKey(stored).then((ok) => {
    if (!ok) {
      form.hidden = false;
      sub.textContent = "This page is private. Enter the password to open it.";

document.getElementById("f").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const pw = document.getElementById("pw").value;

  go.disabled = true; go.textContent = "Checking…"; err.textContent = "";

    err.textContent = "That password didn't work — double-check it and try again.";
