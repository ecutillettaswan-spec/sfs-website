function init() {
  let stored = null;
  try { stored = localStorage.getItem(KEY_STORE); } catch (e) {}
  if (!stored) return;
  const form = document.getElementById("f"), sub = document.querySelector(".sub");
  form.hidden = true;
  sub.textContent = "Opening…";
  tryStoredKey(stored).then((ok) => {
    if (!ok) {
      form.hidden = false;
      sub.textContent = "This page is private. Enter the password to open it.";
    }
  });
}
document.getElementById("f").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const pw = document.getElementById("pw").value;
  if (!pw) return;
  const go = document.getElementById("go"), err = document.getElementById("err");
  go.disabled = true; go.textContent = "Checking…"; err.textContent = "";
  try {
    const salt = payloadBytes().slice(0, 16);
    const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: salt, iterations: ITERATIONS, hash: "SHA-256" },
      km, { name: "AES-GCM", length: 256 }, true, ["decrypt"]);
    const html = await decryptWith(key);
    if (document.getElementById("remember").checked) {
      try { localStorage.setItem(KEY_STORE, b64(await crypto.subtle.exportKey("raw", key))); } catch (e) {}
    }
    show(html);
  } catch (e) {
    err.textContent = "That password didn't work — double-check it and try again.";
    go.disabled = false; go.textContent = "Open";
  }
});
if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
else init();
</script>
</body>
</html>
